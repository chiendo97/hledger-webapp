<form method="post" action="/transactions/new" hx-disabled-elt="find button" class="bg-surface-raised border border-border rounded-lg p-4 mb-4 space-y-3">
  <div class="flex flex-col sm:flex-row gap-2">
    <div class="w-full sm:w-auto">
      <label for="new-tx-date" class="sr-only">Date</label>
      <input id="new-tx-date" type="date" name="date" required
             class="input w-full">
    </div>
    <div class="flex-1">
      <label for="new-tx-desc" class="sr-only">Description</label>
      <input id="new-tx-desc" type="text" name="description" placeholder="Description" required
             class="input w-full">
    </div>
  </div>
  <div class="space-y-2" id="postings">
    <div class="flex gap-2">
      <label for="new-tx-acct-0" class="sr-only">Account 1</label>
      <input id="new-tx-acct-0" type="text" name="account_0" placeholder="Account" list="acct-list" required
             class="input flex-1">
      <label for="new-tx-amt-0" class="sr-only">Amount 1</label>
      <input id="new-tx-amt-0" type="text" name="amount_0" placeholder="Amount (e.g. 100 vnd)"
             class="input w-36">
    </div>
    <div class="flex gap-2">
      <label for="new-tx-acct-1" class="sr-only">Account 2</label>
      <input id="new-tx-acct-1" type="text" name="account_1" placeholder="Account" list="acct-list" required
             class="input flex-1">
      <label for="new-tx-amt-1" class="sr-only">Amount 2</label>
      <input id="new-tx-amt-1" type="text" name="amount_1" placeholder="Amount (optional)"
             class="input w-36">
    </div>
  </div>
  <datalist id="acct-list">
    {% for a in accounts %}<option value="{{ a }}">{% endfor %}
  </datalist>
  <button type="submit" class="w-full btn">Save</button>
</form>

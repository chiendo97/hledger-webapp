<div class="text-sm">
{% for row in rows %}
  <a href="/register?account={{ row.name }}{% if month %}&month={{ month }}{% endif %}"
     class="flex border-b border-border hover:bg-surface-raised/50 py-2">
    <div class="w-3/5 pr-2 text-text-muted truncate" style="padding-left: {{ row.depth * 12 }}px">{{ row.name }}</div>
    <div class="w-2/5 pl-2 font-mono text-right whitespace-nowrap overflow-hidden text-ellipsis">
      {% if row.amount_items|length > 1 %}
        {% for item in row.amount_items %}
        <div class="{% if item.startswith('-') %}text-negative{% else %}text-positive{% endif %}">{{ item }}</div>
        {% endfor %}
      {% else %}
        <span class="{% if row.amounts.startswith('-') %}text-negative{% else %}text-positive{% endif %}">{{ row.amounts }}</span>
      {% endif %}
    </div>
  </a>
{% else %}
  <p class="text-text-faint text-center py-8">No data.</p>
{% endfor %}
</div>

{% extends "base.html" %}
{% set active = "reg" %}
{% block title %}Register{% endblock %}
{% block header %}Register{% endblock %}

{% block content %}
<form method="get" class="mb-4">
  <input type="hidden" name="month" value="{{ month }}">
  <label for="reg-account" class="sr-only">Account</label>
  <select id="reg-account" name="account" onchange="this.form.requestSubmit()"
          class="input rounded-lg w-full">
    <option value="">Select account...</option>
    {% if account and account not in accounts %}
    <option value="{{ account }}" selected>{{ account }}</option>
    {% endif %}
    {% for a in accounts %}
    <option value="{{ a }}" {% if a == account %}selected{% endif %}>{{ a }}</option>
    {% endfor %}
  </select>
</form>

{% if account %}
<div id="page-content"
     hx-get="/register/partial?account={{ account | urlencode }}"
     hx-trigger="load, refresh from:window">
  {% include "partials/skeleton.html" %}
</div>
{% else %}
<p class="empty-state">Choose an account to view its transaction history.</p>
{% endif %}
{% endblock %}

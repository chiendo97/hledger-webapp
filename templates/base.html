<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111827">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <title>{% block title %}hledger{% endblock %}</title>
  <link rel="stylesheet" href="/static/dist.css">
  <style>[x-cloak] { display: none !important; }</style>
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" integrity="sha384-LXWjKwDZz29o7TduNe+r/UxaolHh5FsSvy2W7bDHSZ8jJeGgDeuNnsDNHoxpSgDi" crossorigin="anonymous"></script>
</head>
<body hx-boost="true" class="bg-surface text-text min-h-screen font-mono" style="padding-bottom: calc(5rem + env(safe-area-inset-bottom))">
  <div id="loading-bar"></div>
  <!-- Top bar -->
  <header class="sticky top-0 z-40 bg-surface-raised border-b border-border px-4 py-3 flex items-center justify-center min-h-12">
    <h1 class="text-lg font-semibold leading-none">{% block header %}hledger{% endblock %}</h1>
  </header>

  <!-- Pull-to-refresh indicator -->
  <div id="ptr-indicator" class="fixed left-0 right-0 z-50 flex justify-center pointer-events-none transition-transform duration-200" style="top: env(safe-area-inset-top, 0px); transform: translateY(-100%)">
    <div class="bg-surface-inset text-text-heading text-xs px-4 py-2 rounded-b-lg flex items-center gap-2">
      <svg id="ptr-arrow" class="w-4 h-4 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>
      <span id="ptr-text">Pull to refresh</span>
    </div>
  </div>

  <!-- Content -->
  <main class="max-w-2xl lg:max-w-4xl xl:max-w-5xl mx-auto px-4 py-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Bottom nav -->
  <nav class="fixed bottom-0 inset-x-0 z-40 bg-surface-raised border-t border-border flex justify-around items-center py-2 text-xs sm:text-sm sm:justify-center sm:gap-8" aria-label="Main navigation">
    <a href="/transactions{% if month %}?month={{ month }}{% endif %}" {% if active == 'tx' %}aria-current="page"{% endif %} class="flex flex-col items-center gap-1 min-h-[44px] justify-center focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent-text rounded {% if active == 'tx' %}text-accent-text{% else %}text-text-muted{% endif %}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <span>Txns</span>
    </a>
    <a href="/incomestatement{% if month %}?month={{ month }}{% endif %}" {% if active == 'is' %}aria-current="page"{% endif %} class="flex flex-col items-center gap-1 min-h-[44px] justify-center focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent-text rounded {% if active == 'is' %}text-accent-text{% else %}text-text-muted{% endif %}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
      <span>Income</span>
    </a>
    <a href="/balancesheet{% if month %}?month={{ month }}{% endif %}" {% if active == 'bs' %}aria-current="page"{% endif %} class="flex flex-col items-center gap-1 min-h-[44px] justify-center focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent-text rounded {% if active == 'bs' %}text-accent-text{% else %}text-text-muted{% endif %}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3v-6m-3 6v-1m6-9a2 2 0 012 2v8a2 2 0 01-2 2H9a2 2 0 01-2-2V9a2 2 0 012-2"/></svg>
      <span>Balance</span>
    </a>
    <a href="/budget{% if month %}?month={{ month }}{% endif %}" {% if active == 'budget' %}aria-current="page"{% endif %} class="flex flex-col items-center gap-1 min-h-[44px] justify-center focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent-text rounded {% if active == 'budget' %}text-accent-text{% else %}text-text-muted{% endif %}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"/></svg>
      <span>Budget</span>
    </a>
    <a href="/register{% if month %}?month={{ month }}{% endif %}" {% if active == 'reg' %}aria-current="page"{% endif %} class="flex flex-col items-center gap-1 min-h-[44px] justify-center focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent-text rounded {% if active == 'reg' %}text-accent-text{% else %}text-text-muted{% endif %}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
      <span>Register</span>
    </a>
  </nav>
  <!-- Modal (Alpine.js) -->
  <div id="modal"
       x-data="{ tx: null, editing: false, saving: false, editTags: [], editPostings: [], _prevFocus: null }"
       @show-tx.window="
         _prevFocus = document.activeElement;
         tx = JSON.parse($event.detail);
         editing = false;
         editTags = tx.tags.map(t => ({key: t.key, value: t.value}));
         editPostings = tx.tpostings.map(p => ({account: p.paccount, amount: p.amount_display, balance_assertion: p.balance_assertion_display}));
         $nextTick(() => { const d = document.getElementById('tx-dialog'); if (d) d.focus(); })
       "
       @close-modal.window="tx = null; if (_prevFocus) _prevFocus.focus()"
       @keydown.escape.window="tx = null; if (_prevFocus) _prevFocus.focus()">
    <template x-if="tx">
      <div id="tx-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-surface-overlay" @click.self="tx = null; if (_prevFocus) _prevFocus.focus()">
        <div id="tx-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title" tabindex="-1" class="bg-surface-raised border border-border-input rounded-lg w-full max-w-lg lg:max-w-2xl mx-4 max-h-[85vh] overflow-y-auto focus:outline-none" @click.stop @keydown.tab="
          const focusable = [...$el.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex=\'-1\'])')];
          if (!focusable.length) return;
          const first = focusable[0], last = focusable[focusable.length - 1];
          if ($event.shiftKey && document.activeElement === first) { $event.preventDefault(); last.focus(); }
          else if (!$event.shiftKey && document.activeElement === last) { $event.preventDefault(); first.focus(); }
        ">
          <!-- View mode -->
          <div x-show="!editing">
            <div class="flex justify-between items-center px-4 pt-3 pb-3 border-b border-border">
              <div class="min-w-0 mr-3">
                <h2 id="modal-title" class="text-base font-medium truncate" x-text="tx.tdescription"></h2>
                <div class="text-xs text-text-faint mt-0.5" x-text="tx.tdate + ((tx.tags.find(t => t.key === 'time') || {}).value ? ' · ' + tx.tags.find(t => t.key === 'time').value : '') + ' · #' + tx.tindex"></div>
              </div>
              <button @click="tx = null; if (_prevFocus) _prevFocus.focus()" aria-label="Close" class="text-text-faint hover:text-text w-8 h-8 flex items-center justify-center text-lg leading-none shrink-0">&times;</button>
            </div>
            <div class="px-4 py-3 space-y-3">
              {# Postings — primary content, colored left accent for account identity #}
              <div>
                <template x-for="(p, i) in tx.tpostings" :key="i">
                  <div class="flex py-2" :class="i < tx.tpostings.length - 1 ? 'border-b border-border' : ''">
                    <div class="w-0.5 rounded-full shrink-0 mr-3 self-stretch" :style="'background:' + p.account_color"></div>
                    <div class="flex-1 min-w-0">
                      <div class="flex justify-between items-center">
                        <span class="text-sm truncate pr-2 text-text-heading" x-text="p.paccount"></span>
                        <span class="text-sm whitespace-nowrap" x-show="p.balance_assertion_display" x-text="'= ' + p.balance_assertion_display" class="text-text-muted"></span>
                        <span class="text-sm whitespace-nowrap" x-show="!p.balance_assertion_display" :class="p.negative ? 'text-negative' : 'text-positive'" x-text="p.amount_display"></span>
                      </div>
                      <template x-for="(pt, j) in p.tags" :key="j">
                        <div class="text-xs text-text-faint mt-0.5">
                          <span x-text="pt.key + ':'"></span> <span x-text="pt.value"></span>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
              {# Tags — secondary metadata, skip 'time' since it's in header #}
              <template x-if="tx.tags.filter(t => t.key !== 'time').length > 0">
                <div class="pt-1 space-y-1.5">
                  <template x-for="(tag, i) in tx.tags.filter(t => t.key !== 'time')" :key="i">
                    <div class="text-xs">
                      <div class="text-text-faint" x-text="tag.key.replaceAll('_', ' ')"></div>
                      <div class="text-text-muted break-words" x-text="tag.value"></div>
                    </div>
                  </template>
                </div>
              </template>
              <div class="pt-2">
                <button @click="editing = true; $nextTick(() => document.getElementById('edit-date').focus())" class="btn-secondary w-full text-sm">Edit</button>
              </div>
            </div>
          </div>

          <!-- Edit mode -->
          <div x-show="editing" x-data="{ saveError: '' }">
            <div class="flex justify-between items-center px-4 pt-3 pb-3 border-b border-border">
              <h2 class="text-base font-medium">Edit Transaction</h2>
              <button @click="tx = null; if (_prevFocus) _prevFocus.focus()" aria-label="Close" class="text-text-faint hover:text-text w-8 h-8 flex items-center justify-center text-lg leading-none shrink-0">&times;</button>
            </div>
            <form @submit.prevent="
                    if (saving) return;
                    saving = true;
                    saveError = '';
                    fetch('/transactions/' + tx.tindex, { method: 'POST', body: new FormData($el) })
                      .then(r => { if (r.ok) { tx = null; window.dispatchEvent(new Event('refresh')); } else { r.text().then(t => saveError = t || 'Save failed (' + r.status + ')'); } })
                      .catch(() => saveError = 'Network error — check your connection')
                      .finally(() => saving = false)
                  " class="px-4 py-3 space-y-3">
              <div x-show="saveError" x-cloak class="text-sm text-negative bg-negative/10 border border-negative/20 rounded px-3 py-2 break-words" x-text="saveError"></div>
              <div>
                <label for="edit-date" class="text-xs text-text-muted">Date</label>
                <input id="edit-date" type="date" name="date" :value="tx.tdate" required
                       class="input-compact w-full mt-1">
              </div>
              <div>
                <label for="edit-description" class="text-xs text-text-muted">Description</label>
                <textarea id="edit-description" name="description" rows="2" x-text="tx.tdescription"
                          class="input-compact w-full mt-1 resize-y"></textarea>
              </div>
              <template x-if="editTags.length > 0">
                <div class="space-y-2">
                  <div class="flex gap-2 text-xs text-text-faint px-3">
                    <div class="w-2/5">Tag</div>
                    <div class="flex-1">Value</div>
                  </div>
                  <template x-for="(tag, i) in editTags" :key="i">
                    <div class="flex gap-2">
                      <input type="text" :name="'tag_key_' + i" x-model="tag.key"
                             class="input-compact min-w-0 w-2/5" placeholder="key">
                      <input type="text" :name="'tag_value_' + i" x-model="tag.value"
                             class="input-compact min-w-0 flex-1" placeholder="value">
                    </div>
                  </template>
                </div>
              </template>
              <div class="space-y-2 border-t border-border pt-3">
                <div class="flex gap-2 text-xs text-text-faint px-3">
                  <div class="flex-1">Account</div>
                  <div class="w-2/5">Amount</div>
                </div>
                <template x-for="(p, i) in editPostings" :key="i">
                  <div class="flex gap-2">
                    <input type="text" :name="'account_' + i" x-model="p.account"
                           class="input-compact min-w-0 flex-1" placeholder="Account">
                    <input type="text" :name="'amount_' + i" x-model="p.amount"
                           class="input-compact min-w-0 w-2/5" placeholder="Amount">
                    <template x-if="p.balance_assertion">
                      <input type="hidden" :name="'balance_assertion_' + i" :value="p.balance_assertion">
                    </template>
                  </div>
                </template>
              </div>
              <div class="flex gap-2 pt-3 border-t border-border">
                <button type="submit" :disabled="saving" class="btn-success flex-[2] text-sm disabled:opacity-50">
                  <span x-show="!saving">Save</span>
                  <span x-show="saving" x-cloak>Saving...</span>
                </button>
                <button type="button" @click="editing = false; saveError = ''" class="btn-secondary flex-1 text-sm">Cancel</button>
              </div>
            </form>
          </div>

        </div>
      </div>
    </template>
  </div>
<script>
(function(){
  var bar=document.getElementById('loading-bar');
  document.addEventListener('htmx:beforeRequest',function(){bar.className='active';});
  document.addEventListener('htmx:afterRequest',function(){
    bar.className='done';
    setTimeout(function(){bar.className='';},300);
  });
  document.addEventListener('htmx:responseError', function(e){
    if(e.detail.target) e.detail.target.innerHTML = '<div class="text-center py-8"><p class="text-negative mb-3">Failed to load data.</p><button onclick="window.dispatchEvent(new Event(\'refresh\'))" class="btn-secondary text-sm">Retry</button></div>';
  });
})();
</script>
<script>
(function(){
  const threshold = 80;
  let startY = 0, pulling = false, distance = 0;
  const indicator = document.getElementById('ptr-indicator');
  const arrow = document.getElementById('ptr-arrow');
  const text = document.getElementById('ptr-text');

  document.addEventListener('touchstart', function(e){
    if(window.scrollY === 0 && !document.getElementById('tx-modal')){
      startY = e.touches[0].clientY;
      pulling = true;
      distance = 0;
    }
  }, {passive: true});

  document.addEventListener('touchmove', function(e){
    if(!pulling) return;
    distance = Math.max(0, e.touches[0].clientY - startY);
    if(distance === 0) return;
    const progress = Math.min(distance / threshold, 1);
    indicator.style.transform = 'translateY(' + (progress * 100 - 100) + '%)';
    if(distance >= threshold){
      arrow.style.transform = 'rotate(180deg)';
      text.textContent = 'Release to refresh';
    } else {
      arrow.style.transform = '';
      text.textContent = 'Pull to refresh';
    }
  }, {passive: true});

  document.addEventListener('touchend', function(){
    if(!pulling) return;
    pulling = false;
    indicator.style.transform = 'translateY(-100%)';
    arrow.style.transform = '';
    text.textContent = 'Pull to refresh';
    if(distance >= threshold){
      window.dispatchEvent(new Event('refresh'));
    }
  });
})();
</script>
</body>
</html>
